name: Bug report
description: Report a reproducible problem.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not include API keys, vault contents, private note titles, or other personal data."
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "v0.1.0 or abc1234"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [macOS, Linux, Windows, Other]
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
